services:
  postgres:
    image: postgres:latest
    container_name: nest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    # Postgres 18+ stores data in a version-specific subdirectory.
    # Mount the PARENT directory so PG can manage subdir layout itself.
    # Ref: https://github.com/docker-library/postgres/issues/37
    volumes:
      - pgdata:/var/lib/postgresql
      - ./db/init:/docker-entrypoint-initdb.d:ro

volumes:
  pgdata: