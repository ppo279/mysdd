runtimes:
  - id: claude
    type: claude-cli
    command: claude

global:
  base_layers:
    - name: 宪法约束
      content: ''
    - name: Agent 规范
      content: ''

agents:
  - id: spec
    name: Spec Agent
    runtime: claude
    instruction: ''
    output_file: spec.md
    upstream: []

  - id: plan
    name: Plan Agent
    runtime: claude
    instruction: ''
    output_file: plan.md
    upstream:
      - spec

  - id: tasks
    name: Task Agent
    runtime: claude
    instruction: ''
    output_file: tasks.md
    upstream:
      - spec
      - plan

  - id: coding
    name: Coding Agent
    runtime: claude
    instruction: ''
    output_file: coding.md
    upstream:
      - spec
      - plan
      - tasks
